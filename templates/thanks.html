<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h1>Thank You!</h1>
    <p class="subheading">We've received your details and will be in touch shortly.</p>

    {% if lead %}
    <div class="details">
      <dl>
        <dt>Name</dt>
        <dd>{{ lead.name }}</dd>
        <dt>Email</dt>
        <dd>{{ lead.email }}</dd>
        <dt>Phone</dt>
        <dd>{{ lead.phone }}</dd>
        <dt>Interest</dt>
        <dd>{{ lead.interest }}</dd>
        <dt>Submitted</dt>
        <dd>{{ lead.created_at }}</dd>
      </dl>
    </div>
    {% endif %}

    <p class="nav-link"><a href="/leads">View Dashboard</a></p>
  </div>
</body>
</html>
